services:
  ros2:
    build:
      context: .
      dockerfile: Dockerfile
    image: npva-framework-ros2:humble
    container_name: framework_ros2
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    volumes:
      # Mount source code for live development
      - ./src:/ros2_ws/src
      # Persist build artifacts between runs
      - ros2_build:/ros2_ws/build
      - ros2_install:/ros2_ws/install
      - ros2_log:/ros2_ws/log
    network_mode: host
    stdin_open: true
    tty: true

volumes:
  ros2_build:
  ros2_install:
  ros2_log:
